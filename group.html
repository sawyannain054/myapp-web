<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Chat Room</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #1e2a47; 
            color: white; 
            text-align: center; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h3 { padding: 10px; margin: 0; background: #2c3e50; font-size: 18px; color: #f1c40f; }
        /* Chat Box ကို အောက်က iframe နဲ့ ချိတ်ထားပါတယ် */
        .chat-container {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h3>👥 မန်ဘာများ စကားပြောခန်း</h3>
    
    <!-- အောက်က iframe link က နမူနာ Chat box ပါ။ နောက်ပိုင်း ကိုယ်ပိုင် Cbox link နဲ့ လဲလို့ရပါတယ်။ -->
    <iframe src="https://cbox.ws" 
            width="100%" 
            height="100%" 
            allowtransparency="yes" 
            allow="autoplay" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0" 
            scrolling="auto" 
            class="chat-container">
    </iframe>
</body>
</html>
