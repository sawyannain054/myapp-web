<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Section</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; margin: 0; padding: 20px; }
        #content { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
    </style>
</head>
<body>

<script>
    // Password စနစ် (Page စဖွင့်တာနဲ့ တန်းတောင်းပါမယ်)
    var pass = prompt("Member Password ရိုက်ထည့်ပါ:");
    if (pass == "054540") {
        alert("ဝင်ရောက်ခွင့်ပြုလိုက်ပါပြီ");
        window.onload = function() {
            document.getElementById('content').style.display = 'block';
        };
    } else {
        alert("Password မှားယွင်းနေပါသည်။");
        window.location.href = "index.html"; 
    }
</script>

<div id="content">
    <h1>Member သီးသန့် သင်ခန်းစာများ</h1>
    <hr>
    <p>ဒီနေရာမှာ သင့်ရဲ့ Member တွေအတွက် သင်ခန်းစာတွေကို ရေးထည့်နိုင်ပါပြီ။</p>
</div>

</body>
</html>
