<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Lessons</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #1a73e8; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid #1a73e8; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #1a73e8; }
        .card p { color: #555; line-height: 1.6; }
        .btn { display: inline-block; background: #1a73e8; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<script>
    var pass = prompt("Member Password ရိုက်ထည့်ပါ:");
    if (pass != "054540") {
        alert("Password မှားယွင်းနေပါသည်။");
        window.location.href = "index.html"; 
    }
</script>

<div class="header">
    <h2>Member သီးသန့် သင်ခန်းစာများ</h2>
</div>

<div class="container">
    <!-- သင်ခန်းစာ (၁) -->
    <div class="card">
        <h3>📌 သင်ခန်းစာ (၁) - အခြေခံနည်းလမ်း</h3>
        <p>သင်္ကြန်လည်လို့ပြီးကြပြီလားဟ🙄လည်လို့ဝကြပြီဆိုရင်သင်ခန်းစာတွေစသင်မယ်နော်</p>
        <a href="#" class="">အသေးစိတ်ဖတ်ရန်</a>
    </div>

    <!-- သင်ခန်းစာ (၂) -->
    <div class="card">
        <h3>📌 သင်ခန်းစာ (၂) - အထူးဖော်မြူလာ</h3>
        <p>ဒုတိယသင်ခန်းစာအတွက် ဗီဒီယို သို့မဟုတ် စာသားများကို ဤနေရာတွင် ထည့်သွင်းပါ။</p>
        <a href="#" class="btn">ကြည့်ရှုရန်</a>
    </div>
</div>

</body>
</html>
