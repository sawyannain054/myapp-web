<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">

    <title>Member Section</title>
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 20px; }
        #member-content { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #1a73e8; }

    <script>
        // သင်တောင်းဆိုထားသော Password - 054540
        var correctPassword = "054540"; 
        
        var userPass = prompt("Member သီးသန့် အခန်းဖြစ်ပါသဖြင့် Password ရိုက်ထည့်ပါ:");

        if (userPass === correctPassword) {
            alert("Password မှန်ကန်ပါသည်။ ဝင်ရောက်ခွင့်ပြုလိုက်ပါပြီ။");
            window.onload = function() {
                document.getElementById('member-content').style.display = 'block';
            };
        } else {
            alert("Password မှားယွင်းနေပါသည်။");
            window.location.href = "index.html"; 
        }
    </script>
